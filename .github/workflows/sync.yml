name: Sync upstream & Build Image

on:
  schedule:
    # 每天北京时间 6:00 自动同步（UTC 22:00）
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/douyin-downloader

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream latest code
        run: |
          git remote add upstream https://github.com/jiji262/douyin-downloader.git || true
          git fetch upstream main

          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse HEAD)

          echo "Upstream SHA: $UPSTREAM_SHA"
          echo "Local SHA:    $LOCAL_SHA"

          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "NO_CHANGE=true" >> $GITHUB_ENV
            echo "✅ Already up to date."
          else
            echo "NO_CHANGE=false" >> $GITHUB_ENV
            echo "🔄 New changes detected."
          fi

      - name: Merge upstream changes
        if: env.NO_CHANGE == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit --allow-unrelated-histories

      - name: Overlay HF-specific files
        if: env.NO_CHANGE == 'false'
        run: |
          cp hf/Dockerfile Dockerfile
          cp hf/entrypoint.sh entrypoint.sh
          chmod +x entrypoint.sh

      - name: Push merged code back to GitHub
        if: env.NO_CHANGE == 'false'
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync upstream $(date '+%Y-%m-%d')"
          git push origin main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}
